<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Caminos PRO</title>

<!-- Firebase COMPATIBLE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;padding:15px}
.card{background:white;padding:10px;margin:5px;border-radius:10px}
.extra{border-left:5px solid green}
.fab{position:fixed;bottom:20px;right:20px;background:#2563eb;color:white;width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:30px}
</style>
</head>

<body>

<h2 id="modeText"></h2>
<input id="itemName" placeholder="Artículo">
<button id="shareBtn" onclick="share()">Compartir</button>

<div id="list"></div>
<div class="fab" onclick="fab()">+</div>

<script>

// 🔥 TU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyD0HNFfvNqjYMspNtNFgRxy2segtsRspGo",
  authDomain: "t3-2-1a478.firebaseapp.com",
  projectId: "t3-2-1a478",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// MODO
function getMode(){
  const p=new URLSearchParams(location.search);
  return p.get("mode")||"creator";
}

let mode=getMode();
let items=[];
let extras=[];

// UI
function setup(){
  document.getElementById("modeText").innerText="Modo: "+mode;

  if(mode==="viewer"){
    document.getElementById("shareBtn").style.display="none";
    document.getElementById("itemName").style.display="none";
  }

  if(mode==="filler"){
    document.getElementById("itemName").style.display="none";
  }
}

// SAVE
function save(){
  db.collection("lists").doc("main").set({items,extras});
}

// LOAD
function load(){
  db.collection("lists").doc("main").get().then(doc=>{
    if(doc.exists){
      items=doc.data().items||[];
      extras=doc.data().extras||[];
      render();
    }
  });
}

// +
function fab(){
  if(mode==="creator"){
    let name=itemName.value;
    if(!name)return;
    items.push({name,qty:""});
    itemName.value="";
  }

  if(mode==="filler"){
    if(extras.length>=5)return alert("Max 5");
    let name=prompt("Extra:");
    if(!name)return;
    extras.push({name,qty:""});
  }

  if(mode==="viewer")return;

  save();
  render();
}

// UPDATE
function updateQty(arr,i,val){
  if(mode!=="filler")return;
  arr[i].qty=val;
  save();
}

// SHARE
function share(){
  if(mode==="viewer")return;
  let t="Lista\n\n";
  items.forEach(i=>t+=i.name+" "+i.qty+"\\n");
  window.open("https://wa.me/?text="+encodeURIComponent(t));
}

// RENDER
function render(){
  list.innerHTML="";

  items.forEach((it,i)=>{
    let d=document.createElement("div");
    d.className="card";

    if(mode==="creator"){
      d.innerHTML=it.name;
    }

    if(mode==="filler"){
      d.innerHTML=it.name+' <input type=\"number\" value=\"'+it.qty+'\" onchange=\"updateQty(items,'+i+',this.value)\">';
    }

    if(mode==="viewer"){
      d.innerHTML=it.name+" ("+it.qty+")";
    }

    list.appendChild(d);
  });

  extras.forEach((it,i)=>{
    let d=document.createElement("div");
    d.className="card extra";
    d.innerHTML=it.name+" ("+it.qty+")";
    list.appendChild(d);
  });
}

setup();
load();

</script>

</body>
</html>
